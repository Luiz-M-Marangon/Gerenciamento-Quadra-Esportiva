<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Serviço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-5 flex-grow-1">
    <div class="container mt-4">
        <h1>Cadastro de Serviço</h1>
        <form th:action="@{/servicos/salvar}" th:object="${servico}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Descrição</label>
                <textarea th:field="*{descricao}" class="form-control" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label>Valor Adicional</label>
                <input type="number" step="0.01" th:field="*{valorAdicional}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/servicos" class="btn btn-secondary">Voltar</a>
        </form>
    </div>
</main>

<div class="mt-auto" th:replace="fragments/footer :: footer"></div>
</body>
</html>
