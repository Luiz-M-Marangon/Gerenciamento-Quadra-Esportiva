<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Serviços</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-5 flex-grow-1">
    <div class="container mt-4">
        <h1>Serviços</h1>
        <a href="/servicos/novo" class="btn btn-primary mb-3">Novo Serviço</a>
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Valor Serviço (Por Hora)</th>
                <th width="180">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${servicos}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.nome}"></td>
                <td th:text="${s.descricao}"></td>
                <td th:text="${s.valorAdicional}"></td>
                <td>
                    <a th:href="@{/servicos/editar/{id}(id=${s.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/servicos/excluir/{id}(id=${s.id})}" class="btn btn-danger btn-sm">Excluir</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div class="mt-auto" th:replace="fragments/footer :: footer"></div>
</body>
</html>
