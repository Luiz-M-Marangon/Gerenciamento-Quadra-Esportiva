<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quadra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-5 flex-grow-1">
    <div class="container mt-4">
        <h1>Cadastro de Quadra</h1>

        <form th:action="@{/quadras/salvar}" th:object="${quadra}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Tipo de Esporte</label>
                <input type="text" th:field="*{esporte}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Valor por Hora</label>
                <input type="number" step="0.01" th:field="*{valorHora}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Localização</label>
                <input type="text" th:field="*{localizacao}" class="form-control" required>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" th:field="*{coberta}" class="form-check-input">
                <label class="form-check-label">Coberta</label>
            </div>
            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/quadras" class="btn btn-secondary">Voltar</a>
        </form>
    </div>
</main>

<div class="mt-auto" th:replace="fragments/footer :: footer"></div>
</body>
</html>
