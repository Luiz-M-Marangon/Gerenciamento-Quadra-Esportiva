<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Quadras</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h1>Quadras</h1>

    <a href="/quadras/nova"
       class="btn btn-primary mb-3">
        Nova Quadra
    </a>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Esporte</th>
            <th>Valor Hora</th>
            <th>Localização</th>
            <th>Coberta</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="q : ${quadras}">

            <td th:text="${q.id}"></td>

            <td th:text="${q.nome}"></td>

            <td th:text="${q.tipoEsporte}"></td>

            <td th:text="${q.valorHora}"></td>

            <td th:text="${q.localizacao}"></td>

            <td th:text="${q.coberta ? 'Sim' : 'Não'}"></td>

            <td>

                <a th:href="@{/quadras/editar/{id}(id=${q.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/quadras/excluir/{id}(id=${q.id})}"
                   class="btn btn-danger btn-sm">
                    Excluir
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
