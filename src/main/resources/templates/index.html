<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sistema Quadras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">

    <h1 class="mb-4">Sistema de Gerenciamento</h1>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-4">
                <h3>Quadras</h3>
                <p>Gerencie as quadras esportivas.</p>
                <a href="/quadras" class="btn btn-primary">Gerenciar Quadras</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <h3>Reservas</h3>
                <p>Gerencie reservas das quadras.</p>
                <a href="/reservas" class="btn btn-primary">Gerenciar Reservas</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <h3>Serviços</h3>
                <p>Gerencie serviços adicionais.</p>
                <a href="/servicos" class="btn btn-primary">Gerenciar Serviços</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
