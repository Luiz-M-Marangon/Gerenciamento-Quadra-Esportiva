<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-5 flex-grow-1">

    <form action="/reservas/buscar-tipo"
          method="get"
          class="row g-3 mb-4">
        <div class="col-md-6">
            <input type="text"
                   name="esporte"
                   class="form-control"
                   placeholder="Digite o esporte">

        </div>
        <div class="col-md-2">

            <button type="submit"
                    class="btn btn-dark">
                Buscar
            </button>

        </div>
    </form>

    <table class="table table-bordered mt-4"
           th:if="${reservas != null}">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Data</th>
            <th>Quadra</th>
            <th>Esporte</th>
            <th>Valor</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="r : ${reservas}">

            <td th:text="${r.id}"></td>

            <td th:text="${r.data}"></td>

            <td th:text="${r.quadra.nome}"></td>

            <td th:text="${r.quadra.esporte}"></td>

            <td th:text="${r.valorTotal}"></td>

        </tr>

        </tbody>

    </table>


    <div class="mt-auto" th:replace="fragments/footer :: footer"></div>
</main>
</body>
</html>
