<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Buscar Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container mt-5 flex-grow-1">
    <h2 class="mb-4">Buscar Reservas por Cliente</h2>
    <form action="/reservas/buscar-cliente" method="get" class="row g-3 mb-4">
        <div class="col-md-6">
            <select name="responsavel" class="form-select">
                <option value="">Selecione um responsável</option>
                <option th:each="r : ${responsaveis}" th:value="${r}" th:text="${r}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-dark">Buscar</button>
        </div>
    </form>
    <table class="table table-bordered" th:if="${reservas != null}">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Data</th>
            <th>Quadra</th>
            <th>Responsável</th>
            <th>Valor</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reservas}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.data}"></td>
            <td th:text="${r.quadra.nome}"></td>
            <td th:text="${r.responsavel}"></td>
            <td th:text="${r.valorTotal}"></td>
        </tr>
        </tbody>
    </table>
</main>
<div class="mt-auto" th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
